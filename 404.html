<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found">
  <title>404 - Page Not Found</title>
  <style>
    :root {
      color-scheme: light;
      --primary: #0078d4;
      --primary-dark: #005a9e;
      --background: #f4f8fc;
      --surface: #ffffff;
      --text: #172033;
      --muted: #5f6b7a;
      --border: #d9e2ec;
      --shadow: 0 20px 50px rgba(23, 32, 51, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(0, 120, 212, 0.16), transparent 32rem),
        linear-gradient(135deg, #f8fbff 0%, var(--background) 100%);
    }

    .error-card {
      width: min(680px, 100%);
      padding: clamp(34px, 7vw, 72px);
      text-align: center;
      border: 1px solid rgba(217, 226, 236, 0.9);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .error-code {
      margin: 0;
      color: var(--primary);
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -0.08em;
    }

    h1 {
      margin: 24px 0 0;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      letter-spacing: -0.035em;
    }

    p {
      max-width: 500px;
      margin: 18px auto 0;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.7;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      margin-top: 32px;
      padding: 0 24px;
      border-radius: 12px;
      color: white;
      background: var(--primary);
      box-shadow: 0 12px 28px rgba(0, 120, 212, 0.25);
      text-decoration: none;
      font-weight: 700;
      transition: transform 160ms ease, background 160ms ease;
    }

    .home-link:hover {
      transform: translateY(-2px);
      background: var(--primary-dark);
    }

    .home-link:focus-visible {
      outline: 3px solid rgba(0, 120, 212, 0.35);
      outline-offset: 4px;
    }

    .hint {
      margin-top: 26px;
      font-size: 0.9rem;
      color: #7a8696;
    }
  </style>
</head>
<body>
  <main class="error-card">
    <p class="error-code" aria-hidden="true">404</p>
    <h1>Page Not Found</h1>
    <p>
      The page you requested does not exist, may have been moved,
      or the address may be incorrect.
    </p>
    <a class="home-link" href="/">Return to the home page</a>
    <div class="hint">Error code: 404</div>
  </main>
</body>
</html>
