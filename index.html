<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Product landing page">
  <title>Product Landing Page</title>
  <style>
    :root {
      color-scheme: light;
      --primary: #0078d4;
      --primary-dark: #005a9e;
      --background: #f4f8fc;
      --surface: #ffffff;
      --text: #172033;
      --muted: #5f6b7a;
      --border: #d9e2ec;
      --shadow: 0 20px 50px rgba(23, 32, 51, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(0, 120, 212, 0.14), transparent 34rem),
        linear-gradient(135deg, #f8fbff 0%, var(--background) 100%);
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      color: white;
      background: linear-gradient(135deg, var(--primary), #35a7ff);
      box-shadow: 0 10px 24px rgba(0, 120, 212, 0.25);
    }

    .version-badge {
      padding: 8px 12px;
      border: 1px solid rgba(0, 120, 212, 0.22);
      border-radius: 999px;
      color: var(--primary-dark);
      background: rgba(255, 255, 255, 0.72);
      font-size: 0.88rem;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }

    main {
      width: min(1120px, calc(100% - 40px));
      margin: auto;
      padding: 48px 0 80px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: clamp(40px, 7vw, 88px);
      border: 1px solid rgba(217, 226, 236, 0.9);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 280px;
      height: 280px;
      right: -90px;
      top: -90px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0, 120, 212, 0.2), rgba(53, 167, 255, 0.05));
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--primary-dark);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(2.6rem, 7vw, 5.4rem);
      line-height: 0.98;
      letter-spacing: -0.055em;
    }

    .intro {
      max-width: 650px;
      margin: 28px 0 0;
      color: var(--muted);
      font-size: clamp(1.05rem, 2vw, 1.25rem);
      line-height: 1.75;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 36px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .button-primary {
      color: white;
      background: var(--primary);
      box-shadow: 0 12px 28px rgba(0, 120, 212, 0.25);
    }

    .button-primary:hover {
      background: var(--primary-dark);
    }

    .button-secondary {
      color: var(--text);
      border: 1px solid var(--border);
      background: white;
    }

    footer {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 24px 0 32px;
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
    }

    @media (max-width: 640px) {
      header {
        align-items: flex-start;
      }

      .hero {
        border-radius: 20px;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">P</div>
        <span>Product Studio</span>
      </div>
      <span class="version-badge">Version 1</span>
    </header>

    <main>
      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow">Now available</p>
        <h1 id="page-title">Version 1 — Landing Page</h1>
        <p class="intro">
          Welcome to our product page. This is the initial published version,
          created to introduce our product with a clear, modern and professional experience.
        </p>

        <div class="actions">
          <a class="button button-primary" href="#learn-more">Discover the product</a>
          <a class="button button-secondary" href="mailto:info@example.com">Contact us</a>
        </div>
      </section>

      <section id="learn-more" aria-label="Product information"></section>
    </main>

    <footer>
      &copy; 2026 Product Studio. All rights reserved.
    </footer>
  </div>
</body>
</html>
